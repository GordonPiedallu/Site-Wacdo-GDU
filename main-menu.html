<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@100..900&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <title>Borne Wacdo</title>
</head>
<body>
    <section id="slider"></section>
     <section id="resume-commande">
        <div id="commande">
        <img id="logo" src="images/logo.png" alt="Logo Wacdo">
        </div>
        <div id="commande-info">
        <div id="ligne-commande">
            <p id="text-commande">Commande numéro</p>
            <span id="numéro-commande">72</span>
        </div>
            <span id="endroit-numero">Sur place: 326</span>
        </div>
        <div id="liste-articles"></div>
        <div id="panier-bas">
        <div id="prix">
            <span id="text-prix">TOTAL (TTC)</span>
            <span id="total-prix"></span>
        </div>
        <div id="button-resume">
            <button id="button-abandon">Abandon</button>
            <button id="button-payer">Payer</button>
        </div>
        </div>
    </section>
    <section id="text-menu">
    <h1 id="title-menu">Nos menus</h1>
    <p id="subtitles-menu">Un sandwich, une friture ou une salade et une boisson </p>
    </section>
    <section id="zone-produit"></section>
   <section id="overlay-selection">
        <div id="choix-overlay">
             <img src="images/supprimer.png" id="imgfermer" alt="Croix de fermeture">
            <h1 id="overlay-title">Une petite soif ?</h1>
            <p id="overlay-text">Choisissez la taille de votre boisson,  +0.50€ pour le format 50 Cl</p>
            <div id="icone-choix">
            <a class="choix-menu" id="choix-pboisson" href="#"><img src="boissons/coca-cola.png" alt="Boisson 30Cl">30 Cl</a>   
            <a class="choix-menu" id="choix-gboisson" href="#"><img src="boissons/coca-cola.png" alt="Boisson 50Clm">50 Cl</a>
            </div>
         <div id="compteur">
            <button type="button" id="btn-moins">-</button>
            <span id="quantite">1</span>
            <button type="button" id="btn-plus">+</button>
        </div>
        <div id="bouton-overlay">
            <button type="button" id="btn-annuler">Annuler</button>
            <button type="button" id="btnajout-panier">Ajouter a ma commande</button>
        </div>
        </div>
    </section>
    
    <script src="slider.js"></script> 
    <script src="produit.js"></script>
</body>
</html>
